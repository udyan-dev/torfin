name: torfin
description: "torfin"
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.5.4

dependencies:

  flutter:
    sdk: flutter
  firebase_core: ^3.6.0
  firebase_crashlytics: ^4.1.3
  firebase_analytics: ^11.3.3
  google_mobile_ads: ^5.2.0
  firebase_performance: ^0.10.0+8
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  flutter_bloc: ^8.1.6
  get_it: ^8.0.2
  connectivity_plus: ^6.1.0
  flutter_svg: ^2.0.14
  lottie: ^3.1.3

dev_dependencies:

  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  freezed: ^2.5.7

flutter:

  uses-material-design: true

  assets:
    - assets/fonts/
    - assets/lottie/

  fonts:
    - family: gg
      fonts:
        - asset: assets/fonts/ggsans-Normal.ttf
          weight: 400
        - asset: assets/fonts/ggsans-Medium.ttf
          weight: 500
        - asset: assets/fonts/ggsans-Semibold.ttf
          weight: 600
        - asset: assets/fonts/ggsans-Bold.ttf
          weight: 700
        - asset: assets/fonts/ggsans-ExtraBold.ttf
          weight: 800
